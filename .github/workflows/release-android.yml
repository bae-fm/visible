name: Release Android

# Cuts a signed Android release: a 0.N version line (android-v* tags) and a
# monotonic versionCode (the run number). Cross-compiles visible-bridge in
# release mode, assembles a keystore-signed APK, and publishes it as a GitHub
# release. Manual (workflow_dispatch) â€” releases are cut deliberately, not on push.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version, e.g. 0.2 (blank = auto-increment from android-v* tags)'
        required: false
        default: ''

concurrency:
  group: release-android
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Keep in sync with visible-bridge/build-android.sh's NDK default.
  NDK_VERSION: 29.0.14206865

jobs:
  release:
    name: Build and release signed APK
    runs-on: macos-26
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Determine version
      id: version
      run: |
        # Explicit input wins; otherwise auto-increment the last component of the
        # latest android-v* tag. First release â†’ 0.1.
        if [[ -n "${{ inputs.version }}" ]]; then
          VERSION="${{ inputs.version }}"
        else
          LATEST=$(git tag -l "android-v*" | sed 's/^android-v//' | sort -V | tail -1)
          if [[ -z "$LATEST" ]]; then
            VERSION="0.1"
          else
            VERSION="${LATEST%.*}.$(( ${LATEST##*.} + 1 ))"
          fi
        fi
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "::notice::Android release $VERSION (build ${{ github.run_number }})"

    - name: Setup Rust environment
      uses: ./.github/actions/setup-rust

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Install NDK + platform + build-tools
      run: |
        SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
        yes | "$SDKMANAGER" --licenses >/dev/null
        "$SDKMANAGER" "ndk;${NDK_VERSION}" "platforms;android-35" "build-tools;35.0.0"
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

    - name: Build bridge (release cross-compile + Kotlin bindings + .so)
      run: ./visible-bridge/build-android.sh --release

    - name: Decode signing keystore
      env:
        ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      run: |
        if [[ -z "$ANDROID_KEYSTORE_BASE64" ]]; then
          echo "ANDROID_KEYSTORE_BASE64 is not set â€” cannot sign the release APK." >&2
          exit 1
        fi
        echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/visible-release.jks"
        echo "ANDROID_KEYSTORE_FILE=$RUNNER_TEMP/visible-release.jks" >> "$GITHUB_ENV"

    - name: Assemble signed release APK
      working-directory: visible-android
      env:
        VISIBLE_VERSION: ${{ steps.version.outputs.version }}
        VISIBLE_VERSION_CODE: ${{ github.run_number }}
        ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      run: ./gradlew assembleRelease --no-daemon

    - name: Verify and collect the signed APK
      run: |
        # app-release.apk is the signed output; app-release-unsigned.apk means the
        # signing config didn't apply â€” fail rather than ship an uninstallable APK.
        APK="visible-android/app/build/outputs/apk/release/app-release.apk"
        if [[ ! -f "$APK" ]]; then
          echo "no signed release APK at $APK â€” signing config did not apply" >&2
          ls -la visible-android/app/build/outputs/apk/release || true
          exit 1
        fi
        APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner | sort -V | tail -1)
        "$APKSIGNER" verify --verbose "$APK"
        cp "$APK" "visible-android.apk"
        echo "Verified signed APK: $APK"

    - name: Create git tag
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        if ! git rev-parse "android-v$VERSION" >/dev/null 2>&1; then
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "android-v$VERSION"
          git push origin "android-v$VERSION"
        fi

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: android-v${{ steps.version.outputs.version }}
        files: visible-android.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Refresh the android-latest download
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # A stable link that always serves the newest build: the android-latest
        # release is created once and only its asset is replaced. --latest=false
        # keeps the global "Latest" badge on the real versioned releases.
        gh release view android-latest >/dev/null 2>&1 \
          || gh release create android-latest --latest=false --title "Android â€” latest" \
               --notes "Stable download link that always serves the newest Android build."
        gh release upload android-latest visible-android.apk --clobber
