name: visible
options:
  bundleIdPrefix: fm.bae
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "26.0"
targets:
  visible:
    type: application
    platform: macOS
    sources:
      # The macOS app's own generated bridge bindings (build-macos.sh copies
      # visible_bridge.swift here). Info.plist and visible.entitlements live in
      # this dir too but are referenced via INFOPLIST_FILE / CODE_SIGN_ENTITLEMENTS,
      # not compiled — list the binding file explicitly so they aren't pulled in
      # as the iOS dir's files would be.
      - path: visible/visible_bridge.swift
      # The shared SwiftUI sources, cross-platform via `#if os(...)`, referenced
      # by explicit path from the iOS app tree so the iOS Info.plist and the iOS
      # copy of visible_bridge.swift are not double-included.
      - path: ../../visible-ios/visible/visible/visibleApp.swift
      - path: ../../visible-ios/visible/visible/AppRootView.swift
      - path: ../../visible-ios/visible/visible/AppSession.swift
      - path: ../../visible-ios/visible/visible/BrowseModel.swift
      - path: ../../visible-ios/visible/visible/BrowseView.swift
      - path: ../../visible-ios/visible/visible/SettingsModel.swift
      - path: ../../visible-ios/visible/visible/SettingsView.swift
      - path: ../../visible-ios/visible/visible/ChildCard.swift
      - path: ../../visible-ios/visible/visible/NameSheet.swift
      - path: ../../visible-ios/visible/visible/DeleteConfirmSheet.swift
      - path: ../../visible-ios/visible/visible/NodeActionsMenu.swift
      - path: ../../visible-ios/visible/visible/NodeName.swift
      - path: ../../visible-ios/visible/visible/NodeImageView.swift
      - path: ../../visible-ios/visible/visible/Theme.swift
      - path: ../../visible-ios/visible/visible/Logger.swift
      - path: ../../visible-ios/visible/visible/CameraView.swift
      - path: ../../visible-ios/visible/visible/View+PlatformChrome.swift
    preBuildScripts:
      - name: Build Rust Bridge
        basedOnDependencyAnalysis: false
        script: |
          cd "$SRCROOT/../.."
          MARKER="visible-macos/VisibleBridgeFFI.xcframework/Info.plist"
          BINDINGS="visible-macos/visible/visible/visible_bridge.swift"
          NEEDS_BUILD=0
          if [ ! -f "$MARKER" ]; then
            NEEDS_BUILD=1
          else
            for src in visible-bridge/src/*.rs visible-core/src/*.rs; do
              if [ -f "$src" ] && [ "$src" -nt "$MARKER" ]; then
                NEEDS_BUILD=1
                break
              fi
            done
          fi
          if [ "$NEEDS_BUILD" -eq 1 ]; then
            echo "Bridge sources changed or artifacts missing, rebuilding..."
            ./visible-bridge/build-macos.sh
          fi
          # Always ensure the bindings are in the macOS source tree: a fresh
          # worktree may have the xcframework cached but the binding file absent.
          if [ ! -f "$BINDINGS" ] || [ "visible-bridge/swift-bindings/visible_bridge.swift" -nt "$BINDINGS" ]; then
            cp visible-bridge/swift-bindings/visible_bridge.swift "$BINDINGS"
          fi
    dependencies:
      - framework: ../VisibleBridgeFFI.xcframework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fm.bae.visible.desktop
        PRODUCT_NAME: visible
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: visible/Info.plist
        CODE_SIGN_ENTITLEMENTS: visible/visible.entitlements
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        # No bundled app icon — drop xcodegen's default `AppIcon` lookup so the
        # asset catalog compiles without one.
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        # The Rust staticlib pulls coven's transitive crates (rustls, aws-sdk,
        # keyring, etc.), so the link step must satisfy their system
        # dependencies even though the app never calls those crates.
        OTHER_LDFLAGS:
          - -lz
          - -liconv
          - -framework Security
          - -framework SystemConfiguration
          - -framework CoreFoundation
